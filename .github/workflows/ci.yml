name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check

      - name: Build
        run: cargo build --release

  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: cargo build --release

      - name: Start test server
        run: npm start &

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done

      - name: "Test: timeout — expect SUCCESS"
        run: |
          output=$(cargo run -q --release -- timeout --timeout 5 --server-delay 1)
          echo "$output"
          echo "$output" | grep -q SUCCESS

      - name: "Test: timeout — expect FAILED"
        run: |
          output=$(cargo run -q --release -- timeout --timeout 1 --server-delay 3)
          echo "$output"
          echo "$output" | grep -q FAILED

      - name: "Test: read-timeout — expect SUCCESS"
        run: |
          output=$(cargo run -q --release -- read-timeout --read-timeout 3 --chunk-delay 1 --chunks 3)
          echo "$output"
          echo "$output" | grep -q SUCCESS

      - name: "Test: read-timeout — expect FAILED"
        run: |
          output=$(cargo run -q --release -- read-timeout --read-timeout 1 --chunk-delay 3 --chunks 3)
          echo "$output"
          echo "$output" | grep -q FAILED

      - name: "Test: connect-timeout — expect SUCCESS"
        run: |
          output=$(cargo run -q --release -- connect-timeout --connect-timeout 5)
          echo "$output"
          echo "$output" | grep -q SUCCESS
